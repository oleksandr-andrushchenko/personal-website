AWSTemplateFormatVersion: '2010-09-09'
Description: ACM Certificate for CloudFront in us-east-1

Parameters:
  Project:
    Type: String
    Description: Logical project identifier (e.g. blog)
  Owner:
    Type: String
    Description: Resource owner (e.g. olek)
  Stage:
    Type: String
    Description: Deployment stage (e.g. local, dev, test, prod, etc.)
    AllowedValues: [ local, dev, test, prod ]
  DomainName:
    Type: String
    Description: The domain name to create a certificate for (e.g., www.example.com)
  HostedZoneId:
    Type: String
    Description: The Route53 Hosted Zone ID for the domain

Resources:
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Stage
          Value: !Ref Stage
        - Key: Project
          Value: !Ref Project
        - Key: Owner
          Value: !Ref Owner
        - Key: Region
          Value: !Ref AWS::Region

Outputs:
  CertificateArn:
    Description: ARN of the ACM certificate to use in CloudFront
    Value: !Ref Certificate